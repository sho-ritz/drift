# Drift PR bot (Q24: plain GitHub Actions, no hosted infrastructure).
# Copy to .github/workflows/drift-pr-bot.yml in your repo.
name: drift-pr-bot
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  drift-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Only needed when .drift/config.json says "backend": "codegraph".
      # With the builtin tree-sitter backend (or the automatic fallback),
      # delete this step — drift indexes the working tree by itself.
      # - name: Rebuild CodeGraph index
      #   run: npx @colbymchenry/codegraph index
      - name: Evaluate spec links
        id: drift
        run: |
          npx driftdocs check --diff "origin/${{ github.base_ref }}" || true
          BODY=$(npx driftdocs pr-comment --base "origin/${{ github.base_ref }}") || true
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- drift:pr-comment -->";
            const body = `${{ steps.drift.outputs.body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const mine = comments.find(c => c.body?.includes(marker));
            if (mine) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
